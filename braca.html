<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>פורים שמח - מכונת העצות</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f3e5f5; text-align: center; padding: 20px; min-height: 100vh; margin: 0; color: #4a148c; }
        h1 { color: #880e4f; font-size: 2.5em; margin-bottom: 5px; }
        .subtitle { font-size: 1.2em; font-weight: bold; margin-bottom: 25px; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 25px; }
        .card-wrapper { position: relative; width: 300px; height: 170px; border-radius: 15px; overflow: hidden; box-shadow: 0 8px 20px rgba(0,0,0,0.3); background: white; border: 4px solid #fff; }
        .result { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 15px; background: linear-gradient(135deg, #fff 0%, #fce4ec 100%); }
        .char-name { font-size: 1.4em; font-weight: bold; color: #880e4f; }
        canvas { position: absolute; top: 0; left: 0; z-index: 10; touch-action: none; cursor: pointer; }
        
        /* קרדיט בולט */
        .credit { margin-top: 50px; font-size: 1.2em; color: #fff; background: #880e4f; padding: 10px 20px; border-radius: 50px; display: inline-block; box-shadow: 0 4px 10px rgba(0,0,0,0.2); border: 2px solid #ffd700; }
        
        /* קונפטי */
        .confetti { position: absolute; width: 10px; height: 10px; background-color: #f00; opacity: 0; }
    </style>
</head>
<body>

    <h1>🎭 פורים שמח ומבדח! 🎭</h1>
    <div class="subtitle">גרד/י את אחד הכרטיסים וקבל/י עצה מדמות במגילה:</div>

    <div class="container" id="cards-container"></div>

    <div class="credit">עריכה: מילכה ברקו גרש</div>

<script>
    const surprises = [
        { char: "אסתר המלכה 👑", msg: "יש לך כוח השפעה אדיר. זה הזמן להשמיע את הקול הייחודי שלך!" },
        { char: "מרדכי הצדיק 📜", msg: "התמדה ואמונה בדרך שלך הן המפתח. כדאי ללכת בראש מורם." },
        { char: "אחשוורוש החגיגי 🍷", msg: "החיים הם מסיבה! זמן מצוין ליהנות מהרגע ולחגוג הצלחות." },
        { char: "ושתי העצמאית 💅", msg: "הידיעה מה הערך שלך היא כוח. לפעמים 'לא' הוא התשובה הנכונה." },
        { char: "המן (בגרסה טובה) 📐", msg: "יש לך יכולת תכנון נהדרת. נתב את זה לעשיית טוב לסובבים." },
        { char: "הליצן המסתורי 🤡", msg: "חיוך הוא כוח-על. הפוך/הפכי כל יום רגיל לחג!" }
    ];

    function createConfetti(x, y) {
        for(let i = 0; i < 20; i++) {
            const c = document.createElement('div');
            c.className = 'confetti';
            c.style.left = x + 'px'; c.style.top = y + 'px';
            c.style.backgroundColor = ['#f44336', '#2196f3', '#ffeb3b', '#4caf50'][Math.floor(Math.random()*4)];
            document.body.appendChild(c);
            c.animate([{ transform: `translate(${Math.random()*200-100}px, ${Math.random()*200-100}px) rotate(360deg)`, opacity: 1 }, { opacity: 0 }], { duration: 1000 }).onfinish = () => c.remove();
        }
    }

    const container = document.getElementById('cards-container');
    surprises.forEach((item, index) => {
        const wrapper = document.createElement('div');
        wrapper.className = 'card-wrapper';
        wrapper.innerHTML = `<div class="result"><div class="char-name">${item.char}</div><p>${item.msg}</p></div><canvas id="canvas${index}" width="300" height="170"></canvas>`;
        container.appendChild(wrapper);

        const canvas = document.getElementById(`canvas${index}`);
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#9e9e9e'; ctx.fillRect(0, 0, 300, 170);
        ctx.fillStyle = 'white'; ctx.font = 'bold 22px Arial'; ctx.textAlign = 'center'; ctx.fillText('🎭 גרד/י כאן! ✨', 150, 95);

        let isDrawing = false;
        const move = (e) => {
            if (!isDrawing) return;
            const rect = canvas.getBoundingClientRect();
            const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
            const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath(); ctx.arc(x, y, 20, 0, Math.PI * 2); ctx.fill();
            if(Math.random() > 0.9) createConfetti(e.clientX || e.touches[0].clientX, e.clientY || e.touches[0].clientY);
        };
        canvas.addEventListener('mousedown', () => isDrawing = true);
        canvas.addEventListener('mousemove', move);
        window.addEventListener('mouseup', () => isDrawing = false);
        canvas.addEventListener('touchstart', () => isDrawing = true);
        canvas.addEventListener('touchmove', move);
    });
</script>
</body>
</html>
