<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>פורים שמח</title>
    <style>
        body { font-family: sans-serif; background: #f3e5f5; text-align: center; margin: 0; padding: 20px; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; max-width: 650px; margin: 0 auto; }
        .card-wrapper { position: relative; width: 280px; height: 160px; border-radius: 15px; overflow: hidden; background: white; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        canvas { position: absolute; top: 0; left: 0; touch-action: none; cursor: crosshair; }
        .result { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px; box-sizing: border-box; }
        .credit { margin-top: 30px; font-weight: bold; color: #880e4f; }
    </style>
</head>
<body>

    <h1>🎭 פורים שמח!</h1>
    <div class="container" id="cards-container"></div>
    <div class="credit">עריכה: מילכה ברקו גרש</div>

<script>
    const data = [
        { char: "אסתר המלכה", msg: "יש לך כוח השפעה!" },
        { char: "מרדכי הצדיק", msg: "התמדה היא המפתח!" },
        { char: "אחשוורוש", msg: "זמן למסיבה!" },
        { char: "ושתי", msg: "דע/י את ערכך!" },
        { char: "המן", msg: "נתב/י לטוב!" },
        { char: "ליצן", msg: "חיוך הוא כוח!" }
    ];

    const container = document.getElementById('cards-container');

    data.forEach((item, i) => {
        const wrapper = document.createElement('div');
        wrapper.className = 'card-wrapper';
        wrapper.innerHTML = `<div class="result"><strong>${item.char}</strong><p>${item.msg}</p></div><canvas id="c${i}" width="280" height="160"></canvas>`;
        container.appendChild(wrapper);

        const canvas = document.getElementById(`c${i}`);
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#999'; ctx.fillRect(0, 0, 280, 160);
        ctx.fillStyle = '#fff'; ctx.font = '20px sans-serif'; ctx.textAlign = 'center'; ctx.fillText('גרד/י כאן!', 140, 85);

        const scratch = (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX || e.touches[0].clientX) - rect.left;
            const y = (e.clientY || e.touches[0].clientY) - rect.top;
            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath(); ctx.arc(x, y, 20, 0, Math.PI * 2); ctx.fill();
        };

        canvas.addEventListener('mousemove', (e) => { if(e.buttons) scratch(e); });
        canvas.addEventListener('touchmove', (e) => { scratch(e.touches[0]); }, {passive: false});
    });
</script>
</body>
</html>
