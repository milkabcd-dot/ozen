<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מכונת העצות של פורים 🎭</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f3e5f5; 
            background-image: radial-gradient(#ffeb3b 10%, transparent 10%), radial-gradient(#e91e63 10%, transparent 10%), radial-gradient(#2196f3 10%, transparent 10%), radial-gradient(#4caf50 10%, transparent 10%);
            background-size: 30px 30px;
            background-position: 0 0, 15px 15px, 0 15px, 15px 0;
            text-align: center; 
            padding: 20px; 
            min-height: 100vh;
            margin: 0;
            color: #4a148c;
        }
        h1 { color: #880e4f; text-shadow: 2px 2px 4px rgba(255,255,255,0.8); font-size: 2.5em; margin-bottom: 5px; }
        .subtitle { font-size: 1.3em; font-weight: bold; color: #4a148c; background: rgba(255,255,255,0.6); padding: 5px 15px; border-radius: 15px; display: inline-block; margin-bottom: 25px; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 25px; margin-top: 10px; }
        .card-wrapper { position: relative; width: 300px; height: 170px; border-radius: 15px; overflow: hidden; box-shadow: 0 8px 20px rgba(0,0,0,0.3); background: white; border: 4px solid #fff; transition: transform 0.2s; }
        .card-wrapper:hover { transform: scale(1.03); }
        .result { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 15px; box-sizing: border-box; background: linear-gradient(135deg, #fff 0%, #fce4ec 100%); }
        .char-name { font-size: 1.4em; font-weight: bold; color: #880e4f; margin-bottom: 8px; }
        .char-msg { font-size: 1em; color: #311b92; line-height: 1.4; }
        canvas { position: absolute; top: 0; left: 0; z-index: 10; touch-action: none; cursor: pointer; }
        .credit { margin-top: 40px; font-size: 0.9em; color: #6a1b9a; font-style: italic; background: rgba(255,255,255,0.5); padding: 5px; border-radius: 10px; display: inline-block; }
    </style>
</head>
<body>

    <h1>🎭 פורים שמח ומבדח! 🎭</h1>
    <div class="subtitle">גרדו את אחד הכרטיסים, ותזכו לעיצה מאחת מדמויות מגילת פורים.</div>

    <div class="container" id="cards-container"></div>

    <div class="credit">עריכה: מילכה ברקו גרש</div>

<script>
    const surprises = [
        { char: "אסתר המלכה 👑", msg: "יש לך כוח השפעה אדיר. השנה, זה הזמן להשמיע את הקול הייחודי שלך בזמן הנכון!" },
        { char: "מרדכי הצדיק 📜", msg: "התמדה ואמונה בדרך שלך הן המפתח. מומלץ ללכת בראש מורם, גם כשזה מאתגר." },
        { char: "אחשוורוש החגיגי 🍷", msg: "החיים הם מסיבה! זמן מצוין ליהנות מהרגע, לחגוג את ההצלחות ולפתוח את הלב בנדיבות." },
        { char: "ושתי העצמאית 💅", msg: "הידיעה מה הערך שלך היא כוח. לפעמים, להגיד 'לא' זו הדרך הכי חזקה להגיד 'כן' לעצמך." },
        { char: "המן (בגרסה טובה) 📐", msg: "יש לך כושר תכנון וירידה לפרטים. השנה, כדאי לנתב את הכישרון הזה לבנייה ועשיית טוב לסובבים אותך." },
        { char: "הליצן המסתורי 🤡", msg: "התחפושת הכי טובה היא חיוך. הומור הוא כוח-על שיכול להפוך כל יום רגיל לחג!" }
    ];

    const container = document.getElementById('cards-container');

    surprises.forEach((item, index) => {
        const wrapper = document.createElement('div');
        wrapper.className = 'card-wrapper';
        wrapper.innerHTML = `
            <div class="result">
                <div class="char-name">${item.char}</div>
                <div class="char-msg">${item.msg}</div>
            </div>
            <canvas id="canvas${index}" width="300" height="170"></canvas>
        `;
        container.appendChild(wrapper);

        const canvas = document.getElementById(`canvas${index}`);
        const ctx = canvas.getContext('2d');
        
        const grad = ctx.createLinearGradient(0, 0, 300, 170);
        grad.addColorStop(0, '#9e9e9e');
        grad.addColorStop(0.5, '#bdbdbd');
        grad.addColorStop(1, '#757575');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, 300, 170);
        
        ctx.fillStyle = 'white';
        ctx.font = 'bold 24px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('🎭 גרד כאן! ✨', 150, 95);

        let isDrawing = false;
        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX - rect.left, y: clientY - rect.top };
        }

        const start = () => isDrawing = true;
        const end = () => isDrawing = false;
        const move = (e) => {
            if (!isDrawing) return;
            if(e.touches) e.preventDefault(); 
            const pos = getPos(e);
            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath();
            ctx.arc(pos.x, pos.y, 25, 0, Math.PI * 2);
            ctx.fill();
        };

        canvas.addEventListener('mousedown', start);
        canvas.addEventListener('mousemove', move);
        window.addEventListener('mouseup', end);
        canvas.addEventListener('touchstart', start);
        canvas.addEventListener('touchmove', move, { passive: false });
        canvas.addEventListener('touchend', end);
    });
</script>
</body>
</html>
