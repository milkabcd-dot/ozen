<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>פורים שמח - מכונת העצות</title>
    <style>
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow-x: hidden; touch-action: pan-y;
        }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: #f3e5f5; 
            background-image: 
                radial-gradient(#ffeb3b 10%, transparent 10%),
                radial-gradient(#e91e63 10%, transparent 10%),
                radial-gradient(#2196f3 10%, transparent 10%),
                radial-gradient(#4caf50 10%, transparent 10%);
            background-size: 30px 30px;
            text-align: center; padding: 20px; color: #4a148c; 
        }
        h1 { color: #880e4f; font-size: 2.2em; margin-bottom: 5px; text-shadow: 1px 1px 2px white; }
        .subtitle { font-size: 1.1em; font-weight: bold; margin-bottom: 25px; background: rgba(255,255,255,0.7); padding: 10px; border-radius: 15px; display: inline-block; max-width: 90%; }
        
        .container { 
            display: flex; flex-wrap: wrap; justify-content: center; align-items: center;
            gap: 20px; width: 100%; margin: 0 auto;
        }
        
        .card-wrapper { 
            position: relative; width: 280px; height: 160px; border-radius: 15px; 
            overflow: hidden; box-shadow: 0 6px 15px rgba(0,0,0,0.2); 
            background: white; border: 3px solid #fff;
        }
        
        .result { 
            position: absolute; width: 100%; height: 100%; display: flex; 
            flex-direction: column; align-items: center; justify-content: center; 
            padding: 10px; box-sizing: border-box; background: linear-gradient(135deg, #fff 0%, #fce4ec 100%); 
        }
        
        .char-name { font-size: 1.3em; font-weight: bold; color: #880e4f; margin-bottom: 5px; }
        .char-msg { font-size: 0.95em; color: #311b92; line-height: 1.4; text-align: center; }
        canvas { position: absolute; top: 0; left: 0; z-index: 10; touch-action: none; cursor: pointer; }
        
        .credit { 
            margin-top: 40px; font-size: 1.1em; color: #fff; background: #880e4f; 
            padding: 10px 20px; border-radius: 50px; display: inline-block; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.2); border: 2px solid #ffd700; font-weight: bold;
        }
        
        .confetti-particle { position: absolute; width: 8px; height: 8px; opacity: 0; pointer-events: none; z-index: 100; }
    </style>
</head>
<body>

    <h1>🎭 פורים שמח ומבדח!</h1>
    <div class="subtitle">גרד/י את אחד הכרטיסים וקבל/י עצה מדמות במגילה:</div>

    <div class="container" id="cards-container"></div>

    <div class="credit">עריכה: מילכה ברקו גרש</div>

<script>
    const surprises = [
        { char: "אסתר המלכה 👑", msg: "יש לך כוח השפעה אדיר.<br>זה הזמן להשמיע את הקול הייחודי שלך!" },
        { char: "מרדכי הצדיק 📜", msg: "התמדה ואמונה בדרך שלך הן המפתח.<br>מומלץ ללכת בראש מורם." },
        { char: "אחשוורוש החגיגי 🍷", msg: "החיים הם מסיבה!<br>זמן מצוין ליהנות מהרגע ולחגוג הצלחות." },
        { char: "ושתי העצמאית 💅", msg: "הידיעה מה הערך שלך היא כוח.<br>לפעמים 'לא' הוא התשובה הנכונה." },
        { char: "המן (בגרסה טובה) 📐", msg: "יש לך יכולת תכנון נהדרת.<br>נתב את זה לעשיית טוב לסובבים." },
        { char: "הליצן המסתורי 🤡", msg: "חיוך הוא כוח-על.<br>הפוך/הפכי כל יום רגיל לחג!" }
    ];

    function createConfettiExplosion(x, y) {
        for(let i = 0; i < 15; i++) {
            const c = document.createElement('div');
            c.className = 'confetti-particle';
            c.style.left = x + 'px'; c.style.top = y + 'px';
            c.style.backgroundColor = ['#f44336', '#2196f3', '#ffeb3b', '#4caf50'][Math.floor(Math.random()*4)];
            document.body.appendChild(c);
            c.animate([{ transform: 'translate(0,0) rotate(0deg)', opacity: 1 }, 
                       { transform: `translate(${(Math.random()-0.5)*150}px, ${(Math.random()-0.5)*150}px) rotate(360deg)`, opacity: 0 }], 
                      { duration: 800 }).onfinish = () => c.remove();
        }
    }

    const container = document.getElementById('cards-container');
    surprises.forEach((item, index) => {
        const wrapper = document.createElement('div');
        wrapper.className = 'card-wrapper';
        wrapper.innerHTML = `<div class="result"><div class="char-name">${item.char}</div><div class="char-msg">${item.msg}</div></div><canvas id="canvas${index}" width="280" height="160"></canvas>`;
        container.appendChild(wrapper);

        const canvas = document.getElementById(`canvas${index}`);
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#9e9e9e'; ctx.fillRect(0, 0, 280, 160);
        ctx.fillStyle = 'white'; ctx.font = 'bold 20px Arial'; ctx.textAlign = 'center'; ctx.fillText('🎭 גרד/י כאן! ✨', 140, 85);

        let isDrawing = false;
        const scratch = (clientX, clientY) => {
            const rect = canvas.getBoundingClientRect();
            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath(); ctx.arc(clientX - rect.left, clientY - rect.top, 20, 0, Math.PI * 2); ctx.fill();
            if(Math.random() > 0.85) createConfettiExplosion(clientX, clientY);
        };

        canvas.addEventListener('mousedown', () => isDrawing = true);
        canvas.addEventListener('mousemove', (e) => { if(isDrawing) scratch(e.clientX, e.clientY); });
        window.addEventListener('mouseup', () => isDrawing = false);
        canvas.addEventListener('touchstart', () => isDrawing = true);
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); scratch(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
        canvas.addEventListener('touchend', () => isDrawing = false);
    });
</script>
</body>
</html>
