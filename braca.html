<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>פורים שמח - מכונת העצות</title>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow-x: hidden; touch-action: pan-y; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: #f3e5f5; 
            background-image: radial-gradient(#ffeb3b 10%, transparent 10%), radial-gradient(#e91e63 10%, transparent 10%), radial-gradient(#2196f3 10%, transparent 10%), radial-gradient(#4caf50 10%, transparent 10%);
            background-size: 30px 30px;
            text-align: center; padding: 20px; color: #4a148c; 
        }
        
        .container { 
            display: flex; flex-wrap: wrap; justify-content: center; align-items: center;
            gap: 20px; width: 100%; max-width: 900px; margin: 0 auto;
        }
        
        .card-wrapper { 
            position: relative; width: 280px; height: 160px; border-radius: 15px; 
            overflow: hidden; box-shadow: 0 6px 15px rgba(0,0,0,0.2); 
            background: white; border: 3px solid #fff;
        }
        
        canvas { position: absolute; top: 0; left: 0; z-index: 10; touch-action: none; cursor: pointer; }
        
        .confetti-particle { position: absolute; width: 8px; height: 8px; opacity: 0; pointer-events: none; z-index: 100; }
    </style>
</head>
<body>

    <h1>🎭 פורים שמח ומבדח!</h1>
    <div class="container" id="cards-container"></div>
    <div class="credit">עריכה: מילכה ברקו גרש</div>

<script>
    const surprises = [
        { char: "אסתר המלכה 👑", msg: "יש לך כוח השפעה אדיר." },
        { char: "מרדכי הצדיק 📜", msg: "התמדה בדרך שלך היא המפתח." },
        { char: "אחשוורוש החגיגי 🍷", msg: "החיים הם מסיבה!" },
        { char: "ושתי העצמאית 💅", msg: "דע/י את הערך שלך." },
        { char: "המן (בגרסה טובה) 📐", msg: "נתב/י את הכישרון לעשיית טוב." },
        { char: "הליצן המסתורי 🤡", msg: "חיוך הוא כוח-על!" }
    ];

    function createConfetti(x, y) {
        for(let i = 0; i < 15; i++) {
            const c = document.createElement('div');
            c.className = 'confetti-particle';
            c.style.left = x + 'px'; c.style.top = y + 'px';
            c.style.backgroundColor = ['#f44336', '#2196f3', '#ffeb3b', '#4caf50'][Math.floor(Math.random()*4)];
            document.body.appendChild(c);
            c.animate([{ transform: 'translate(0,0) rotate(0deg)', opacity: 1 }, 
                       { transform: `translate(${(Math.random()-0.5)*150}px, ${(Math.random()-0.5)*150}px) rotate(360deg)`, opacity: 0 }], 
                      { duration: 800 }).onfinish = () => c.remove();
        }
    }

    const container = document.getElementById('cards-container');
    surprises.forEach((item, index) => {
        const wrapper = document.createElement('div');
        wrapper.className = 'card-wrapper';
        wrapper.innerHTML = `<div style="padding:20px;"><strong>${item.char}</strong><p>${item.msg}</p></div><canvas id="canvas${index}" width="280" height="160"></canvas>`;
        container.appendChild(wrapper);

        const canvas = document.getElementById(`canvas${index}`);
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#9e9e9e'; ctx.fillRect(0, 0, 280, 160);
        ctx.fillStyle = 'white'; ctx.font = '20px Arial'; ctx.textAlign = 'center'; ctx.fillText('גרד/י כאן!', 140, 85);

        const scratch = (clientX, clientY) => {
            const rect = canvas.getBoundingClientRect();
            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath(); ctx.arc(clientX - rect.left, clientY - rect.top, 20, 0, Math.PI * 2); ctx.fill();
            if(Math.random() > 0.85) createConfetti(clientX, clientY);
        };

        canvas.addEventListener('mousemove', (e) => { if(e.buttons) scratch(e.clientX, e.clientY); });
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); scratch(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
    });
</script>
</body>
</html>
