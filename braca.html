<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>פורים שמח - מכונת העצות</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; text-align: center; color: #4a148c;
            background-color: #f3e5f5; 
            background-image: radial-gradient(#ffeb3b 10%, transparent 10%), radial-gradient(#e91e63 10%, transparent 10%), radial-gradient(#2196f3 10%, transparent 10%), radial-gradient(#4caf50 10%, transparent 10%);
            background-size: 30px 30px;
            background-position: 0 0, 15px 15px, 0 15px, 15px 0;
        }
        
        h1 { color: #880e4f; font-size: 2.2em; margin-bottom: 5px; }
        .subtitle { font-size: 1.1em; font-weight: bold; margin-bottom: 25px; background: rgba(255,255,255,0.7); padding: 10px; border-radius: 15px; display: inline-block; }
        
        .container { 
            display: flex; flex-wrap: wrap; justify-content: center; align-items: center;
            gap: 20px; width: 100%; max-width: 900px; margin: 0 auto;
        }
        
        .card-wrapper { 
            position: relative; width: 280px; height: 160px; border-radius: 15px; 
            overflow: hidden; box-shadow: 0 6px 15px rgba(0,0,0,0.2); 
            background: white; border: 3px solid #fff;
        }
        
        canvas { position: absolute; top: 0; left: 0; z-index: 10; touch-action: none; cursor: pointer; }
        
        /* החלקיקים חייבים להיות עם pointer-events: none כדי לא לחסום את המגע */
        .confetti-particle { 
            position: absolute; width: 8px; height: 8px; opacity: 1; pointer-events: none; z-index: 5; 
        }
        
        .credit { margin-top: 40px; font-size: 1.1em; color: #880e4f; font-weight: bold; }
    </style>
</head>
<body>

    <h1>🎭 פורים שמח ומבדח!</h1>
    <div class="subtitle">גרד/י את אחד הכרטיסים וקבל/י עצה מדמות במגילה:</div>

    <div class="container" id="cards-container"></div>

    <div class="credit">עריכה: מילכה ברקו גרש</div>

<script>
    const surprises = [
        { char: "אסתר המלכה 👑", msg: "יש לך כוח השפעה אדיר.<br>זה הזמן להשמיע את הקול שלך!" },
        { char: "מרדכי הצדיק 📜", msg: "התמדה בדרך שלך היא המפתח.<br>מומלץ ללכת בראש מורם." },
        { char: "אחשוורוש החגיגי 🍷", msg: "החיים הם מסיבה!<br>זמן מצוין ליהנות מהרגע." },
        { char: "ושתי העצמאית 💅", msg: "הידיעה מה הערך שלך היא כוח.<br>לפעמים 'לא' זה נכון." },
        { char: "המן (בגרסה טובה) 📐", msg: "יש לך יכולת תכנון נהדרת.<br>נתב/י את זה לטובה." },
        { char: "הליצן המסתורי 🤡", msg: "חיוך הוא כוח-על.<br>הפוך/הפכי כל יום לחג!" }
    ];

    function createConfetti(x, y) {
        for(let i = 0; i < 10; i++) {
            const c = document.createElement('div');
            c.className = 'confetti-particle';
            c.style.left = x + 'px'; c.style.top = y + 'px';
            c.style.backgroundColor = ['#f44336', '#2196f3', '#ffeb3b', '#4caf50'][Math.floor(Math.random()*4)];
            document.body.appendChild(c);
            c.animate([
                { transform: 'translate(0,0) rotate(0deg)', opacity: 1 }, 
                { transform: `translate(${(Math.random()-0.5)*100}px, ${(Math.random()-0.5)*100}px) rotate(360deg)`, opacity: 0 }
            ], { duration: 600 }).onfinish = () => c.remove();
        }
    }

    const container = document.getElementById('cards-container');
    surprises.forEach((item, index) => {
        const wrapper = document.createElement('div');
        wrapper.className = 'card-wrapper';
        wrapper.innerHTML = `<div style="padding:20px; display: flex; flex-direction: column; justify-content: center; height: 100%;"><strong>${item.char}</strong><p>${item.msg}</p></div><canvas id="canvas${index}" width="280" height="160"></canvas>`;
        container.appendChild(wrapper);

        const canvas = document.getElementById(`canvas${index}`);
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#9e9e9e'; ctx.fillRect(0, 0, 280, 160);
        ctx.fillStyle = 'white'; ctx.font = '20px Arial'; ctx.textAlign = 'center'; ctx.fillText('🎭 גרד/י כאן! ✨', 140, 85);

        const scratch = (clientX, clientY) => {
            const rect = canvas.getBoundingClientRect();
            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath(); ctx.arc(clientX - rect.left, clientY - rect.top, 20, 0, Math.PI * 2); ctx.fill();
            if(Math.random() > 0.8) createConfetti(clientX, clientY);
        };

        canvas.addEventListener('mousemove', (e) => { if(e.buttons) scratch(e.clientX, e.clientY); });
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); scratch(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
    });
</script>
</body>
</html>
