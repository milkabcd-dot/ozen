<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>פורים שמח - מכונת העצות</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            overflow-x: hidden;
            touch-action: pan-y;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: #f3e5f5; 
            background-image: radial-gradient(#ffeb3b 10%, transparent 10%), radial-gradient(#e91e63 10%, transparent 10%), radial-gradient(#2196f3 10%, transparent 10%), radial-gradient(#4caf50 10%, transparent 10%);
            background-size: 30px 30px;
            text-align: center; 
            padding: 20px; 
            color: #4a148c; 
        }
        
        /* התיקון למרכוז הכרטיסים */
        .container { 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; /* מרכז אופקית */
            align-items: center;     /* מרכז אנכית אם צריך */
            gap: 20px; 
            width: 100%;             /* תופס את כל רוחב המסך */
            max-width: 900px;        /* מונע מהם להתרחב יותר מדי במחשב */
            margin: 0 auto;          /* ממקם את הקונטיינר עצמו באמצע */
        }
        
        .card-wrapper { 
            position: relative; 
            width: 280px; 
            height: 160px; 
            border-radius: 15px; 
            overflow: hidden; 
            box-shadow: 0 6px 15px rgba(0,0,0,0.2); 
            background: white; 
            border: 3px solid #fff; 
        }
        
        canvas { 
            position: absolute; top: 0; left: 0; z-index: 10; 
            touch-action: none; 
            cursor: pointer; 
        }
    </style>
</head>
<body>
    <h1>🎭 פורים שמח ומבדח!</h1>
    <div class="subtitle">גרד/י את אחד הכרטיסים וקבל/י עצה מדמות במגילה:</div>
    <div class="container" id="cards-container"></div>
    <div class="credit">עריכה: מילכה ברקו גרש</div>

<script>
    // הוספתי כאן את הלוגיקה החסרה של הקוד שצירפת כדי שהכל יעבוד
    const surprises = [
        { char: "אסתר המלכה 👑", msg: "יש לך כוח השפעה אדיר." },
        { char: "מרדכי הצדיק 📜", msg: "התמדה בדרך שלך היא המפתח." },
        { char: "אחשוורוש החגיגי 🍷", msg: "החיים הם מסיבה!" },
        { char: "ושתי העצמאית 💅", msg: "דע/י את הערך שלך." },
        { char: "המן (בגרסה טובה) 📐", msg: "נתב/י את הכישרון לעשיית טוב." },
        { char: "הליצן המסתורי 🤡", msg: "חיוך הוא כוח-על!" }
    ];

    const container = document.getElementById('cards-container');
    surprises.forEach((item, index) => {
        const wrapper = document.createElement('div');
        wrapper.className = 'card-wrapper';
        wrapper.innerHTML = `<div style="padding:20px;"><strong>${item.char}</strong><p>${item.msg}</p></div><canvas id="canvas${index}" width="280" height="160"></canvas>`;
        container.appendChild(wrapper);

        const canvas = document.getElementById(`canvas${index}`);
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#9e9e9e'; ctx.fillRect(0, 0, 280, 160);
        ctx.fillStyle = 'white'; ctx.font = '20px Arial'; ctx.textAlign = 'center'; ctx.fillText('גרד/י כאן!', 140, 85);

        const scratch = (e) => {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath(); ctx.arc(clientX - rect.left, clientY - rect.top, 20, 0, Math.PI * 2); ctx.fill();
        };

        canvas.addEventListener('mousemove', (e) => { if(e.buttons) scratch(e); });
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); scratch(e); }, { passive: false });
    });
</script>
</body>
</html>
