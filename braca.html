<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>פורים שמח - מכונת העצות</title>
    <style>
        /* קיבוע מוחלט של המסך */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow-x: hidden; /* חוסם תזוזה אופקית */
            touch-action: pan-y; /* מאפשר גלילה רק למעלה-למטה */
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: #f3e5f5; 
            background-image: radial-gradient(#ffeb3b 10%, transparent 10%), radial-gradient(#e91e63 10%, transparent 10%), radial-gradient(#2196f3 10%, transparent 10%), radial-gradient(#4caf50 10%, transparent 10%);
            background-size: 30px 30px;
            text-align: center; 
            padding: 20px; 
            color: #4a148c; 
        }
        
        .container { 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            gap: 20px; 
        }
        
        .card-wrapper { 
            position: relative; 
            width: 280px; 
            height: 160px; 
            border-radius: 15px; 
            overflow: hidden; 
            box-shadow: 0 6px 15px rgba(0,0,0,0.2); 
            background: white; 
            border: 3px solid #fff; 
        }
        
        /* הקנבס הוא זה שחייב להיות מוגדר עם touch-action: none */
        canvas { 
            position: absolute; top: 0; left: 0; z-index: 10; 
            touch-action: none; /* קריטי - מונע מהדפדפן להשתלט על הגרירה */
            cursor: pointer; 
        }

        /* ... שאר העיצוב נשאר זהה ... */
    </style>
</head>
<body>
    <h1>🎭 פורים שמח ומבדח!</h1>
    <div class="subtitle">גרד/י את אחד הכרטיסים וקבל/י עצה מדמות במגילה:</div>
    <div class="container" id="cards-container"></div>
    <div class="credit">עריכה: מילכה ברקו גרש</div>

<script>
    // ... (מערך surprises ופונקציית הקונפטי נשארים זהים) ...
    
    // בתוך הלולאה של יצירת הכרטיסים:
    canvas.addEventListener('touchmove', (e) => {
        e.preventDefault(); // מונע לחלוטין את ברירת המחדל של הדפדפן
        const rect = canvas.getBoundingClientRect();
        const x = e.touches[0].clientX - rect.left;
        const y = e.touches[0].clientY - rect.top;
        
        ctx.globalCompositeOperation = 'destination-out';
        ctx.beginPath(); 
        ctx.arc(x, y, 20, 0, Math.PI * 2); 
        ctx.fill();
        
        if(Math.random() > 0.85) createConfettiExplosion(e.touches[0].clientX, e.touches[0].clientY);
    }, { passive: false }); // חשוב מאוד כדי שה-preventDefault יעבוד
</script>
</body>
</html>
