<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>פורים שמח - מכונת העצות</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            padding: 20px;
            background-color: #f3e5f5; 
            background-image: radial-gradient(#ffeb3b 10%, transparent 10%), radial-gradient(#e91e63 10%, transparent 10%), radial-gradient(#2196f3 10%, transparent 10%), radial-gradient(#4caf50 10%, transparent 10%);
            background-size: 30px 30px;
            text-align: center; 
            color: #4a148c; 
        }
        
        h1 { color: #880e4f; font-size: 2.2em; margin-bottom: 5px; text-shadow: 1px 1px 2px white; }
        
        .subtitle { 
            font-size: 1.1em; 
            font-weight: bold; 
            margin-bottom: 25px; 
            background: rgba(255,255,255,0.7);
            padding: 10px;
            border-radius: 15px;
            display: inline-block;
            max-width: 90%;
        }

        .container { 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            align-items: center;
            gap: 20px; 
            width: 100%; 
            max-width: 900px; 
            margin: 0 auto;
        }
        
        .card-wrapper { 
            position: relative; 
            width: 280px; 
            height: 160px; 
            border-radius: 15px; 
            overflow: hidden; 
            box-shadow: 0 6px 15px rgba(0,0,0,0.2); 
            background: white; 
            border: 3px solid #fff;
        }
        
        canvas { 
            position: absolute; top: 0; left: 0; z-index: 10; 
            touch-action: none; cursor: pointer; 
        }
        
        .credit { 
            margin-top: 40px; 
            font-size: 1.1em; 
            color: #880e4f; 
            font-weight: bold; 
        }
    </style>
</head>
<body>

    <h1>🎭 פורים שמח ומבדח!</h1>
    <div class="subtitle">גרד/י את אחד הכרטיסים וקבל/י עצה מדמות במגילה:</div>

    <div class="container" id="cards-container"></div>

    <div class="credit">עריכה: מילכה ברקו גרש</div>

<script>
    const surprises = [
        { char: "אסתר המלכה 👑", msg: "יש לך כוח השפעה אדיר.<br>זה הזמן להשמיע את הקול הייחודי שלך!" },
        { char: "מרדכי הצדיק 📜", msg: "התמדה בדרך שלך היא המפתח.<br>מומלץ ללכת בראש מורם." },
        { char: "אחשוורוש החגיגי 🍷", msg: "החיים הם מסיבה!<br>זמן מצוין ליהנות מהרגע ולחגוג הצלחות." },
        { char: "ושתי העצמאית 💅", msg: "הידיעה מה הערך שלך היא כוח.<br>לפעמים 'לא' הוא התשובה הנכונה." },
        { char: "המן (בגרסה טובה) 📐", msg: "יש לך יכולת תכנון נהדרת.<br>נתב את זה לעשיית טוב לסובבים." },
        { char: "הליצן המסתורי 🤡", msg: "חיוך הוא כוח-על.<br>הפוך/הפכי כל יום רגיל לחג!" }
    ];

    const container = document.getElementById('cards-container');
    surprises.forEach((item, index) => {
        const wrapper = document.createElement('div');
        wrapper.className = 'card-wrapper';
        wrapper.innerHTML = `<div style="padding:20px; display: flex; flex-direction: column; justify-content: center; height: 100%; box-sizing: border-box;"><strong>${item.char}</strong><p style="font-size: 0.9em;">${item.msg}</p></div><canvas id="canvas${index}" width="280" height="160"></canvas>`;
        container.appendChild(wrapper);

        const canvas = document.getElementById(`canvas${index}`);
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#9e9e9e'; ctx.fillRect(0, 0, 280, 160);
        ctx.fillStyle = 'white'; ctx.font = 'bold 20px Arial'; ctx.textAlign = 'center'; ctx.fillText('🎭 גרד/י כאן! ✨', 140, 85);

        const scratch = (e) => {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath(); ctx.arc(clientX - rect.left, clientY - rect.top, 20, 0, Math.PI * 2); ctx.fill();
        };

        canvas.addEventListener('mousemove', (e) => { if(e.buttons) scratch(e); });
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); scratch(e); }, { passive: false });
    });
</script>
</body>
</html>
